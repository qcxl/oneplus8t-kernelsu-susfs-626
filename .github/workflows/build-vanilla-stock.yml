name: Build Vanilla Kernel (STOCK defconfig only)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build stock kebab kernel
    runs-on: ubuntu-22.04
    container: ubuntu:20.04
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            git curl wget zip unzip python3 \
            build-essential libssl-dev bc cpio kmod \
            device-tree-compiler lz4 zstd flex bison libelf-dev \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabi \
            lld llvm binutils

      - name: Clone Android clang r450784d
        run: |
          git clone --depth 1 https://github.com/TheBizarreAbhishek/clang-r450784d.git /tmp/clang-r450784d

      - name: Clone kernel source (exact device commit)
        run: |
          git clone --depth 500 --branch lineage-20 \
            https://github.com/LineageOS/android_kernel_oneplus_sm8250.git kernel
          cd kernel
          git checkout 5dea892fe7e4
          git log --oneline -1

      - name: Build kernel with STOCK defconfig (no patches, no device config)
        working-directory: kernel
        run: |
          export PATH="/tmp/clang-r450784d/bin:$PATH"
          export ARCH=arm64
          export LLVM=1
          export LLVM_IAS=1

          make O=out ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            vendor/kona-perf_defconfig

          make -j"$(nproc --all)" O=out ARCH=arm64 \
            CC=clang \
            LD=ld.lld \
            AR=llvm-ar NM=llvm-nm OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump STRIP=llvm-strip \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-gnu- \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi- \
            2>&1 | tee build.log

      - name: Verify kernel image
        working-directory: kernel
        run: |
            IMAGE_GZ=out/arch/arm64/boot/Image.gz
            IMAGE=out/arch/arm64/boot/Image
            if [ ! -f "$IMAGE_GZ" ] && [ ! -f "$IMAGE" ]; then
            echo "Build failed"
            tail -200 build.log
            exit 1
            fi
            if [ ! -f "$IMAGE_GZ" ] && [ -f "$IMAGE" ]; then
            gzip -c "$IMAGE" > "$IMAGE_GZ"
            fi
            ls -lh out/arch/arm64/boot/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kebab-kernelsu-stock-defconfig
          path: kernel/out/arch/arm64/boot/Image.gz
          retention-days: 30
